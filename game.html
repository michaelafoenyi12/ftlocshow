<!DOCTYPE html>
<html>
<head>
  <title>FTLOC Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: #fff;
    }

    #questionGrid button,
    #answers button {
      margin: 5px;
      padding: 15px 20px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #questionGrid button:hover,
    #answers button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px gold;
    }

    #timer {
      font-size: 70px;
      font-weight: bold;
      margin-top: 15px;
      color: #FFD700;
      text-shadow: 0 0 20px gold, 0 0 40px orange;
    }

    #gameOverMessage,
    #boxResultMessage {
      font-size: 60px;
      font-weight: bold;
      margin-top: 20px;
    }

    #boxResultMessage.win {
      color: gold;
      text-shadow: 0 0 20px yellow, 0 0 40px orange;
      animation: glow 1s infinite alternate;
    }

    #boxResultMessage.lose {
      color: red;
      text-shadow: 0 0 20px red, 0 0 40px darkred;
      animation: shake 0.5s;
    }

    #message {
      color: gold;
      font-size: 22px;
      margin-top: 10px;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px yellow, 0 0 40px orange; }
      to { text-shadow: 0 0 40px yellow, 0 0 80px orange; }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-10px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body>

<h2>Game Board</h2>
<div id="questionGrid"></div>

<div id="gameArea" style="display:none;">
  <h2 id="questionText"></h2>
  <h3 id="message"></h3>
  <h2 id="gameOverMessage"></h2>
  <h2 id="boxResultMessage"></h2>
  <div id="answers"></div>
  <h3 id="timer">60</h3>
</div>

<script>
let gamePhase = "question";
let moneyBox = null;
let timeLeft;
let timerInterval;

// Sounds
const winSound = new Audio("https://freesound.org/data/previews/320/320181_4939433-lq.mp3");
const loseSound = new Audio("https://freesound.org/data/previews/331/331912_3248244-lq.mp3");

// Questions
const questions = {
  1: { text: "What is 2 + 2?", options: ["3", "4", "5", "6", "7"], correct: 1 },
  2: { text: "Which planet is known as the Red Planet?", options: ["Earth", "Mars", "Venus", "Jupiter", "Saturn"], correct: 1 },
  3: { text: "What color is the sky?", options: ["Blue", "Green", "Red", "Yellow", "Purple"], correct: 0 },
  4: { text: "What is the capital of France?", options: ["Berlin", "Madrid", "Paris", "Rome", "Lisbon"], correct: 2 },
  // Add more questions here
  5: { text: "Which animal is called the King of the Jungle?", options: ["Lion", "Tiger", "Elephant", "Leopard", "Bear"], correct: 0 }
};

// Dynamically create buttons for all questions
const questionGrid = document.getElementById("questionGrid");
for (let qNum in questions) {
  const btn = document.createElement("button");
  btn.innerText = qNum;
  btn.onclick = () => loadQuestion(qNum);
  questionGrid.appendChild(btn);
}

// Load question
function loadQuestion(num) {
  if (gamePhase !== "question") return;
  const q = questions[num];
  if (!q) return;

  document.getElementById("gameArea").style.display = "block";
  document.getElementById("message").innerText = "";
  document.getElementById("gameOverMessage").innerText = "";
  document.getElementById("boxResultMessage").innerText = "";
  document.getElementById("boxResultMessage").className = "";
  document.getElementById("questionText").innerText = q.text;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";
  const letters = ["A", "B", "C", "D", "E"];
  q.options.forEach((opt, index) => {
    const btn = document.createElement("button");
    btn.innerText = letters[index] + ". " + opt;
    btn.onclick = () => checkAnswer(index, q.correct);
    answersDiv.appendChild(btn);
  });

  startQuestionTimer();
}

// Timer functions
function startQuestionTimer() {
  clearInterval(timerInterval);
  timeLeft = 60;
  document.getElementById("timer").innerText = timeLeft;
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if (timeLeft <= 0) { clearInterval(timerInterval); alert("⏰ Time's up! Game Over."); resetGame(); }
  }, 1000);
}

// Answer check
function checkAnswer(selected, correct) {
  clearInterval(timerInterval);
  if (selected === correct) {
    gamePhase = "box";
    document.getElementById("questionText").innerText = "🎉 Correct Answer!";
    document.getElementById("message").innerText = "Select the correct box to win big from the FTLOC Box Challenge!";
    showMoneyBoxes();
  } else {
    const msg = document.getElementById("gameOverMessage");
    msg.innerText = "🚨 WRONG! GAME OVER 🚨";
    msg.style.animation = "shake 0.5s";
    loseSound.play();
    setTimeout(resetGame, 2000);
  }
}

// Money boxes
function showMoneyBoxes() {
  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "<h2>FTLOC Box Challenge</h2>";
  moneyBox = Math.floor(Math.random() * 5);

  for (let i = 0; i < 5; i++) {
    const btn = document.createElement("button");
    btn.innerText = "FTLOC " + (i + 1);
    btn.onclick = function() {
      clearInterval(timerInterval);
      const boxMsg = document.getElementById("boxResultMessage");
      if (i === moneyBox) {
        boxMsg.innerText = "🎉 YOU WIN! 💰";
        boxMsg.className = "win";
        winSound.play();
      } else {
        boxMsg.innerText = "❌ YOU LOST!";
        boxMsg.className = "lose";
        loseSound.play();
      }
      setTimeout(resetGame, 2000);
    };
    answersDiv.appendChild(btn);
  }

  startBoxTimer();
}

function startBoxTimer() {
  clearInterval(timerInterval);
  timeLeft = 30;
  document.getElementById("timer").innerText = timeLeft;
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if (timeLeft <= 0) { clearInterval(timerInterval); alert("⏰ Time's Up! Game Over."); resetGame(); }
  }, 1000);
}

// Reset game
function resetGame() {
  gamePhase = "question";
  document.getElementById("gameArea").style.display = "none";
  document.getElementById("message").innerText = "";
  document.getElementById("gameOverMessage").innerText = "";
  document.getElementById("boxResultMessage").innerText = "";
  document.getElementById("boxResultMessage").className = "";
  clearInterval(timerInterval);
}
</script>

</body>
</html>
