<!DOCTYPE html>
<html>
<head>
  <title>FTLOC Game</title>

  <style>
    #answers {
      margin-top: 20px;
      text-align: center;
    }

    #answers button {
      display: block;
      width: 250px;
      margin: 10px auto;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #timer {
      text-align: center;
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2 style="text-align:center;">Game Board</h2>

<div id="questionGrid" style="text-align:center;">
  <button onclick="loadQuestion(1)">1</button>
  <button onclick="loadQuestion(2)">2</button>
  <button onclick="loadQuestion(3)">3</button>
  <button onclick="loadQuestion(4)">4</button>
</div>

<div id="gameArea" style="display:none; text-align:center;">
  <h2 id="questionText"></h2>
  <div id="answers"></div>
  <h3 id="timer">60</h3>
</div>

<script>

let gamePhase = "question";
let moneyBox = null;
let timeLeft;
let timerInterval;

const questions = {
  1: {
    text: "What is 2 + 2?",
    options: ["3", "4", "5", "6", "7"],
    correct: 1
  },
  2: {
    text: "Which planet is known as the Red Planet?",
    options: ["Earth", "Mars", "Venus", "Jupiter", "Saturn"],
    correct: 1
  },
  3: {
    text: "What color is the sky?",
    options: ["Blue", "Green", "Red", "Yellow", "Purple"],
    correct: 0
  },
  4: {
    text: "What is the capital of France?",
    options: ["Berlin", "Madrid", "Paris", "Rome", "Lisbon"],
    correct: 2
  }
};

function loadQuestion(num) {

  if (gamePhase !== "question") return;

  const q = questions[num];
  if (!q) return;

  document.getElementById("gameArea").style.display = "block";
  document.getElementById("questionText").innerText = q.text;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  const letters = ["A", "B", "C", "D", "E"];

  q.options.forEach((opt, index) => {
    const btn = document.createElement("button");
    btn.innerText = letters[index] + ". " + opt;
    btn.onclick = () => checkAnswer(index, q.correct);
    answersDiv.appendChild(btn);
  });

  startQuestionTimer();
}

function startQuestionTimer() {

  clearInterval(timerInterval);

  timeLeft = 60;
  document.getElementById("timer").innerText = timeLeft;

  timerInterval = setInterval(() => {

    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time's up!");
      resetGame();
    }

  }, 1000);
}

function checkAnswer(selected, correct) {

  clearInterval(timerInterval);

  if (selected === correct) {
    alert("Correct! Now select a money box.");
    gamePhase = "box";
    showMoneyBoxes();
  } else {
    alert("Wrong! Game Over.");
    resetGame();
  }
}

function showMoneyBoxes() {

  const answersDiv = document.getElementById("answers");

  // 🔥 Title added
  answersDiv.innerHTML = "<h2>FTLOC Box Challenge</h2>";

  moneyBox = Math.floor(Math.random() * 5);

  for (let i = 0; i < 5; i++) {

    const btn = document.createElement("button");
    btn.innerText = "FTLOC " + (i + 1);

    btn.onclick = function () {

      clearInterval(timerInterval);

      if (i === moneyBox) {
        alert("🎉 YOU WIN! 💰");
      } else {
        alert("❌ You Lost!");
      }

      resetGame();
    };

    answersDiv.appendChild(btn);
  }

  // 🔥 Delay ensures UI renders before timer starts
  setTimeout(() => {
    startBoxTimer();
  }, 100);
}

function startBoxTimer() {

  clearInterval(timerInterval);

  timeLeft = 30;
  document.getElementById("timer").innerText = timeLeft;

  timerInterval = setInterval(() => {

    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("⏰ Time's Up! Game Over.");
      resetGame();
    }

  }, 1000);
}

function resetGame() {
  gamePhase = "question";
  document.getElementById("gameArea").style.display = "none";
  clearInterval(timerInterval);
}

</script>

</body>
</html>
