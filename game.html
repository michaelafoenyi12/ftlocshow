<!DOCTYPE html>
<html>
<head>
  <title>FTLOC Game</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #questionGrid button {
      margin: 5px;
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    #answers {
      margin-top: 20px;
    }

    #answers button {
      display: block;
      width: 250px;
      margin: 10px auto;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    /* Timer styling */
    #timer {
      font-size: 70px;       /* Bigger font size */
      font-weight: bold;      /* Makes it bold */
      margin-top: 15px;
      color: #FFD700;         /* Gold color for visibility */
    }

    #gameOverMessage {
      color: red;
      font-size: 60px;
      font-weight: bold;
      margin-top: 20px;
    }

    #boxResultMessage {
      font-size: 60px;
      font-weight: bold;
      margin-top: 20px;
    }

    #message {
      color: gold;
      font-size: 22px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Game Board</h2>

<div id="questionGrid">
  <button onclick="loadQuestion(1)">1</button>
  <button onclick="loadQuestion(2)">2</button>
  <button onclick="loadQuestion(3)">3</button>
  <button onclick="loadQuestion(4)">4</button>
</div>

<div id="gameArea" style="display:none;">
  <h2 id="questionText"></h2>
  <h3 id="message"></h3>
  <h2 id="gameOverMessage"></h2>
  <h2 id="boxResultMessage"></h2>
  <div id="answers"></div>
  <h3 id="timer">60</h3>
</div>

<script>
let gamePhase = "question";
let moneyBox = null;
let timeLeft;
let timerInterval;
function flashMessage(element, color1, color2, times, interval) {
  let count = 0;
  const flashInterval = setInterval(() => {
    element.style.color = (count % 2 === 0) ? color1 : color2;
    count++;
    if (count >= times * 2) clearInterval(flashInterval);
  }, interval);
}

const questions = {
  1: { text: "What is 2 + 2?", options: ["3", "4", "5", "6", "7"], correct: 1 },
  2: { text: "Which planet is known as the Red Planet?", options: ["Earth", "Mars", "Venus", "Jupiter", "Saturn"], correct: 1 },
  3: { text: "What color is the sky?", options: ["Blue", "Green", "Red", "Yellow", "Purple"], correct: 0 },
  4: { text: "What is the capital of France?", options: ["Berlin", "Madrid", "Paris", "Rome", "Lisbon"], correct: 2 }
};

function loadQuestion(num) {
  if (gamePhase !== "question") return;
  const q = questions[num];
  if (!q) return;

  document.getElementById("gameArea").style.display = "block";
  document.getElementById("message").innerText = "";
  document.getElementById("gameOverMessage").innerText = "";
  document.getElementById("boxResultMessage").innerText = "";
  document.getElementById("questionText").innerText = q.text;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  const letters = ["A", "B", "C", "D", "E"];
  q.options.forEach((opt, index) => {
    const btn = document.createElement("button");
    btn.innerText = letters[index] + ". " + opt;
    btn.onclick = () => checkAnswer(index, q.correct);
    answersDiv.appendChild(btn);
  });

  startQuestionTimer();
}

function startQuestionTimer() {
  clearInterval(timerInterval);
  timeLeft = 60;
  document.getElementById("timer").innerText = timeLeft;

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time's up!");
      resetGame();
    }
  }, 1000);
}

function checkAnswer(selected, correct) {
  clearInterval(timerInterval);
  if (selected === correct) {
    gamePhase = "box";
    document.getElementById("questionText").innerText = "🎉 Correct Answer!";
    document.getElementById("message").innerText = "Select the correct box to win big from the FTLOC Box Challenge!";
    showMoneyBoxes();
  } else {
    document.getElementById("gameOverMessage").innerText = "🚨 WRONG! GAME OVER 🚨";
    setTimeout(() => resetGame(), 2000);
  }
}

function showMoneyBoxes() {
  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "<h2>FTLOC Box Challenge</h2>";
  moneyBox = Math.floor(Math.random() * 5);

  for (let i = 0; i < 5; i++) {
    const btn = document.createElement("button");
    btn.innerText = "FTLOC " + (i + 1);
    btn.onclick = function () {
      clearInterval(timerInterval);
      const resultEl = document.getElementById("boxResultMessage");

if (i === moneyBox) {
  resultEl.innerText = "🎉 YOU WIN! 💰";
  flashMessage(resultEl, "gold", "orange", 10, 150);
} else {
  resultEl.innerText = "❌ YOU LOST!";
  flashMessage(resultEl, "red", "black", 10, 150);
}

// Give time for flashing to show
setTimeout(() => resetGame(), 4000);
    };
    answersDiv.appendChild(btn);
  }

  startBoxTimer();
}

function startBoxTimer() {
  clearInterval(timerInterval);
  timeLeft = 30;
  document.getElementById("timer").innerText = timeLeft;

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("⏰ Time's Up! Game Over.");
      resetGame();
    }
  }, 1000);
}

function resetGame() {
  gamePhase = "question";
  document.getElementById("gameArea").style.display = "none";
  document.getElementById("message").innerText = "";
  document.getElementById("gameOverMessage").innerText = "";
  document.getElementById("boxResultMessage").innerText = "";
  clearInterval(timerInterval);
}
</script>

</body>
</html>
