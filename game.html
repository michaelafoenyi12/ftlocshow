<!DOCTYPE html>
<html>
<head>
  <title>FTLOC Game Show</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: #fff;
      padding: 10px;
    }

    #timer {
      font-size: 50px;
      color: gold;
      margin-bottom: 20px;
    }

    #questionGrid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 10px;
    }

    #questionGrid button {
      margin: 5px;
      padding: 15px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    #questionGrid button.locked {
      pointer-events: none;
      opacity: 0.5;
    }

    #questionGrid button.selected {
      background: gold;
      color: black;
    }

    #questionText {
      background: #1a1a1a;
      border: 2px solid gold;
      padding: 20px;
      border-radius: 12px;
      width: 80%;
      margin: 20px auto;
    }

    #answers {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    #answers button {
      min-width: 140px;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.4s forwards;
    }

    #answers button:hover,
    .box:hover {
      box-shadow: 0 0 20px gold;
    }

    @keyframes fadeInUp {
      to { opacity:1; transform:translateY(0); }
    }

    .box {
      width: 90px;
      height: 90px;
      background: gold;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .dazzle {
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow:0 0 10px gold; }
      to { box-shadow:0 0 25px yellow; }
    }

    #homeButton {
      display:none;
      margin:40px auto;
      padding:15px 30px;
      background:gold;
      color:black;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2 id="timer">60</h2>

<h2>Game Board</h2>
<p>Select any number of your choice to reveal the question.</p>

<div id="questionGrid"></div>

<div id="gameArea" style="display:none;">
  <h2 id="questionText"></h2>
  <h3 id="message"></h3>
  <h2 id="gameOverMessage"></h2>
  <h2 id="boxResultMessage"></h2>
  <div id="answers"></div>
</div>

<button id="homeButton">Go Back</button>

<script>
let timerInterval, timeLeft, moneyBox;

// Voices
const gameOverSound=new Audio("https://michaelafoenyi12.github.io/ftlocshow/gameover.mp3");
const winSound=new Audio("https://michaelafoenyi12.github.io/ftlocshow/win.mp3");
const loseSound=new Audio("https://michaelafoenyi12.github.io/ftlocshow/lose.mp3");

// Questions (20)
const questions={
1:{text:"2+2?",options:["3","4","5","6","7"],correct:1},
2:{text:"Red planet?",options:["Earth","Mars","Venus","Jupiter","Saturn"],correct:1},
3:{text:"Sky color?",options:["Blue","Green","Red","Yellow","Purple"],correct:0},
4:{text:"Capital of France?",options:["Berlin","Madrid","Paris","Rome","Lisbon"],correct:2},
5:{text:"Largest ocean?",options:["Atlantic","Indian","Pacific","Arctic","Southern"],correct:2},
6:{text:"5+5?",options:["8","9","10","11","12"],correct:2},
7:{text:"Sun rises in?",options:["West","East","North","South","None"],correct:1},
8:{text:"Fastest animal?",options:["Lion","Tiger","Cheetah","Horse","Dog"],correct:2},
9:{text:"Water freezes?",options:["0","10","20","30","40"],correct:0},
10:{text:"Square sides?",options:["3","4","5","6","7"],correct:1},
11:{text:"Opposite of hot?",options:["Warm","Cold","Cool","Freeze","Ice"],correct:1},
12:{text:"Primary color?",options:["Green","Purple","Red","Black","White"],correct:2},
13:{text:"Planet with rings?",options:["Earth","Mars","Saturn","Venus","Mercury"],correct:2},
14:{text:"1+1?",options:["1","2","3","4","5"],correct:1},
15:{text:"Largest animal?",options:["Elephant","Blue Whale","Shark","Lion","Tiger"],correct:1},
16:{text:"Bird can't fly?",options:["Eagle","Parrot","Penguin","Crow","Sparrow"],correct:2},
17:{text:"Banana color?",options:["Red","Green","Yellow","Blue","Black"],correct:2},
18:{text:"Days in week?",options:["5","6","7","8","9"],correct:2},
19:{text:"Earth shape?",options:["Flat","Round","Square","Triangle","Oval"],correct:1},
20:{text:"Fire is?",options:["Cold","Hot","Wet","Dry","Soft"],correct:1}
};

// Build question grid
for(let q in questions){
  let btn=document.createElement("button");
  btn.innerText=q;
  btn.onclick=()=>loadQuestion(q,btn);
  document.getElementById("questionGrid").appendChild(btn);
}

// Load question
function loadQuestion(num, btn){
  document.getElementById("gameArea").style.display="block";
  document.getElementById("homeButton").style.display="none"; // hide on new question

  document.querySelectorAll("#questionGrid button").forEach(b=>b.classList.add("locked"));
  btn.classList.add("selected");

  let q = questions[num];
  document.getElementById("questionText").innerText = q.text;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML="";
  document.getElementById("message").innerText="";
  document.getElementById("gameOverMessage").innerText="";
  document.getElementById("boxResultMessage").innerText="";

  let letters = ["A","B","C","D","E"];

  q.options.forEach((opt,i)=>{
    setTimeout(()=>{
      let b = document.createElement("button");
      b.innerText = letters[i] + ". "+opt;
      b.onclick = ()=>checkAnswer(i,q.correct,b);
      answersDiv.appendChild(b);
    }, i*300);
  });

  startTimer(60);
}

// Timer
function startTimer(sec){
  clearInterval(timerInterval);
  timeLeft = sec;
  document.getElementById("timer").innerText = timeLeft;

  timerInterval = setInterval(()=>{
    document.getElementById("timer").innerText = timeLeft;
    timeLeft--;
    if(timeLeft < 0){
      clearInterval(timerInterval);
      document.getElementById("gameOverMessage").innerText = "⏰ TIME UP!";
      gameOverSound.play();
      lockAnswers();
      document.getElementById("homeButton").style.display="block";
    }
  },1000);
}

// Check answer
function checkAnswer(sel, correct, btn){
  clearInterval(timerInterval);

  lockAnswers();
  btn.style.background="gold";
  btn.style.color="black";

  if(sel===correct){
    document.getElementById("message").innerText="Now Select from the FTLOC Box Challenge to win a prize.";
    showBoxes();
  } else {
    document.getElementById("gameOverMessage").innerText="🚨 WRONG! GAME OVER";
    gameOverSound.play();
    document.getElementById("homeButton").style.display="block";
  }
}

// Lock answers
function lockAnswers(){
  document.querySelectorAll("#answers button").forEach(b=>{
    b.disabled=true;
    b.style.opacity="0.6";
  });
}

// Show boxes
function showBoxes(){
  document.getElementById("answers").innerHTML="";
  moneyBox = Math.floor(Math.random()*5);
  startTimer(30);

  for(let i=0;i<5;i++){
    let box=document.createElement("div");
    box.className="box";
    box.innerText="BOX "+(i+1);

    box.onclick=()=>{
      clearInterval(timerInterval);
      document.querySelectorAll(".box").forEach(b=>b.style.pointerEvents="none");

      if(i===moneyBox){
        box.classList.add("dazzle");
        document.getElementById("boxResultMessage").innerText="🎉 YOU WIN!";
        winSound.play();
      } else {
        document.getElementById("boxResultMessage").innerText="❌ YOU LOST!";
        loseSound.play();
        document.querySelectorAll(".box")[moneyBox].classList.add("dazzle");
      }

      document.getElementById("homeButton").style.display="block";
    };

    document.getElementById("answers").appendChild(box);
  }
}

// Reset game
document.getElementById("homeButton").onclick=()=>location.reload();

</script>

</body>
</html>
